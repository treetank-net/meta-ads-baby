<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Meta Ads — Authorization</title>
</head><body>
<script>
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  if (token) {
    window.location.href = 'http://127.0.0.1:9876/oauth-callback?access_token=' + encodeURIComponent(token);
  } else {
    document.body.textContent = params.get('error_description') || params.get('error') || 'No token received.';
  }
</script>
</body></html>
